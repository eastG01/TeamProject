<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --surface2: #22263a;
    --border:   #2e3350;
    --accent:   #4f8ef7;
    --danger:   #f74f6a;
    --warn:     #f7a94f;
    --success:  #4ff7a0;
    --text:     #e8eaf6;
    --sub:      #7b82a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; height: 56px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .logo { width: 28px; height: 28px; background: linear-gradient(135deg, #f74f6a, #f7a94f); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .header-title { font-size: 15px; font-weight: 700; }
  .header-badge { margin-left: auto; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--danger); background: rgba(247,79,106,0.12); padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(247,79,106,0.25); }
  .tabs { display: flex; gap: 4px; padding: 24px 32px 0; }
  .tab { padding: 10px 20px; border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); border-bottom: none; background: var(--surface2); color: var(--sub); transition: all 0.2s; }
  .tab.active { background: var(--surface); color: var(--text); }
  .content { padding: 0 32px 60px; }
  .panel { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 0 12px 12px 12px; padding: 28px; }
  .panel.active { display: block; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-size: 15px; font-weight: 700; }
  .form-box { display: none; background: var(--surface2); border-radius: 10px; padding: 18px; margin-bottom: 20px; border: 1px solid var(--border); }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
  input[type="text"], select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; padding: 9px 14px; outline: none; transition: border-color 0.2s; flex: 1; min-width: 120px; }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--sub); }
  .btn { padding: 9px 18px; border-radius: 8px; border: none; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger  { background: var(--danger); color: #fff; }
  .btn-warn    { background: var(--warn); color: #1a1200; }
  .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-sm      { font-size: 11px; padding: 5px 10px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--surface2); color: var(--sub); font-weight: 500; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 12px 14px; border-bottom: 1px solid rgba(46,51,80,0.5); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(79,142,247,0.04); }
  .badge { display: inline-flex; align-items: center; font-size: 11px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .badge-red    { background: rgba(247,79,106,0.12); color: var(--danger); border: 1px solid rgba(247,79,106,0.3); }
  .badge-orange { background: rgba(247,169,79,0.12); color: var(--warn); border: 1px solid rgba(247,169,79,0.3); }
  .badge-green  { background: rgba(79,247,160,0.12); color: var(--success); border: 1px solid rgba(79,247,160,0.3); }
  .badge-blue   { background: rgba(79,142,247,0.12); color: var(--accent); border: 1px solid rgba(79,142,247,0.3); }
  .pattern-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 11px; font-family: 'JetBrains Mono', monospace; background: var(--surface2); color: var(--sub); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; }
  .edit-input { background: var(--surface2); border: 1px solid var(--accent); border-radius: 6px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 12px; padding: 5px 8px; width: 100%; outline: none; }
  .edit-select { background: var(--surface2); border: 1px solid var(--accent); border-radius: 6px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 12px; padding: 5px 8px; outline: none; }
  .btn-group { display: flex; gap: 6px; }
  .empty { text-align: center; padding: 40px; color: var(--sub); font-size: 13px; }
  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--surface2); border-radius: 10px; padding: 12px 20px; font-size: 13px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 999; border-left: 3px solid var(--accent); }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-left-color: var(--danger); }
  .toast.ok { border-left-color: var(--success); }
  .count-badge { font-size: 11px; font-family: 'JetBrains Mono', monospace; background: var(--surface2); color: var(--accent); padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
  .edit-row td { background: rgba(79,142,247,0.05); }
</style>
</head>
<body>

<header class="header">
  <div class="logo">🛡</div>
  <span class="header-title">관리자 대시보드</span>
  <span class="header-badge">ADMIN</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('badwords')">욕설 사전 <span class="count-badge" id="bw-count">0</span></div>
  <div class="tab" onclick="switchTab('whitelist')">화이트리스트 <span class="count-badge" id="wl-count">0</span></div>
  <div class="tab" onclick="switchTab('penalties')">유저 제재 <span class="count-badge" id="pe-count">0</span></div>
  <div class="tab" onclick="switchTab('users')">회원 관리 <span class="count-badge" id="us-count">0</span></div>
  <div class="tab" onclick="switchTab('logs')">댓글 로그 <span class="count-badge" id="log-count">0</span></div>
</div>

<div class="content">

  <!-- 욕설 사전 -->
  <div class="panel active" id="panel-badwords">
    <div class="section-header">
      <span class="section-title">욕설 사전 관리</span>
      <button class="btn btn-primary" onclick="toggleForm('bw-form')">+ 단어 추가</button>
    </div>
    <div class="form-box" id="bw-form">
      <div class="form-row">
        <input type="text" id="bw-word" placeholder="욕설 단어 (예: 찐따)">
        <input type="text" id="bw-patterns" placeholder="변형 패턴 쉼표 구분 (예: ㅉㄷ, 찐따)">
        <select id="bw-severity">
          <option value="1">심각도 1 (경미)</option>
          <option value="2">심각도 2 (보통)</option>
          <option value="3" selected>심각도 3 (심각)</option>
        </select>
        <button class="btn btn-primary" onclick="addBadword()">추가</button>
        <button class="btn btn-ghost" onclick="toggleForm('bw-form')">취소</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>단어</th><th>변형 패턴</th><th>심각도</th><th>등록일</th><th>관리</th></tr>
        </thead>
        <tbody id="bw-tbody"></tbody>
      </table>
      <div class="empty" id="bw-empty" style="display:none">등록된 욕설이 없습니다.</div>
    </div>
  </div>

  <!-- 화이트리스트 -->
  <div class="panel" id="panel-whitelist">
    <div class="section-header">
      <span class="section-title">화이트리스트 관리</span>
      <button class="btn btn-primary" onclick="toggleForm('wl-form')">+ 단어 추가</button>
    </div>
    <div class="form-box" id="wl-form">
      <div class="form-row">
        <input type="text" id="wl-word" placeholder="예외 허용 단어 (예: 병신증)">
        <input type="text" id="wl-reason" placeholder="허용 이유 (예: 의학 용어)">
        <button class="btn btn-primary" onclick="addWhitelist()">추가</button>
        <button class="btn btn-ghost" onclick="toggleForm('wl-form')">취소</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>단어</th><th>허용 이유</th><th>등록일</th><th>관리</th></tr>
        </thead>
        <tbody id="wl-tbody"></tbody>
      </table>
      <div class="empty" id="wl-empty" style="display:none">등록된 예외 단어가 없습니다.</div>
    </div>
  </div>

  <!-- 유저 제재 -->
  <div class="panel" id="panel-penalties">
    <div class="section-header">
      <span class="section-title">유저 제재 관리</span>
      <button class="btn btn-ghost" onclick="loadPenalties()">새로고침</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>유저 ID</th><th>경고 횟수</th><th>제재 상태</th><th>사유</th><th>최종 업데이트</th><th>관리</th></tr>
        </thead>
        <tbody id="pe-tbody"></tbody>
      </table>
      <div class="empty" id="pe-empty" style="display:none">제재된 유저가 없습니다.</div>
    </div>
  </div>

  <!-- 회원 관리 -->
  <div class="panel" id="panel-users">
    <div class="section-header">
      <span class="section-title">회원 관리</span>
      <button class="btn btn-ghost" onclick="loadUsers()">새로고침</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>유저 ID</th><th>가입일</th><th>경고 횟수</th><th>제재 상태</th><th>관리</th></tr>
        </thead>
        <tbody id="us-tbody"></tbody>
      </table>
      <div class="empty" id="us-empty" style="display:none">가입된 회원이 없습니다.</div>
    </div>
  </div>
  <div class="panel" id="panel-logs">
    <div class="section-header">
      <span class="section-title">댓글 로그 관리</span>
      <button class="btn btn-ghost" onclick="loadLogs()">새로고침</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>유저</th><th>댓글 내용</th><th>판정</th><th>방법</th><th>날짜</th><th>관리</th></tr>
        </thead>
        <tbody id="log-tbody"></tbody>
      </table>
      <div class="empty" id="log-empty" style="display:none">로그가 없습니다.</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://127.0.0.1:8000/admin';

// 데이터 캐시 - onclick에 한글 직접 넣지 않기 위해 사용
const _cache = { bw: {}, wl: {}, pe: {} };

// ── 유틸 ──────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['badwords','whitelist','penalties','users','logs'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'badwords')  loadBadwords();
  if (name === 'whitelist') loadWhitelist();
  if (name === 'penalties') loadPenalties();
  if (name === 'users')     loadUsers();
}

function toggleForm(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function showToast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 2800);
}

function severityBadge(s) {
  if (s >= 3) return `<span class="badge badge-red">심각 ${s}</span>`;
  if (s === 2) return `<span class="badge badge-orange">보통 ${s}</span>`;
  return `<span class="badge badge-blue">경미 ${s}</span>`;
}

function statusBadge(s) {
  if (s === '차단') return `<span class="badge badge-red">차단</span>`;
  if (s === '경고') return `<span class="badge badge-orange">경고</span>`;
  return `<span class="badge badge-green">정상</span>`;
}

// ── 욕설 사전 ─────────────────────────────────────────────────────────────────
async function loadBadwords() {
  const res = await fetch(`${API}/badwords`).catch(() => null);
  if (!res) { showToast('서버 연결 실패', 'error'); return; }
  const data = await res.json();
  document.getElementById('bw-count').textContent = data.length;
  document.getElementById('bw-empty').style.display = data.length ? 'none' : 'block';

  // 데이터 캐시에 저장 (onclick에 한글 직접 X)
  data.forEach(r => { _cache.bw[r.id] = r; });

  document.getElementById('bw-tbody').innerHTML = data.map(r => `
    <tr id="bw-row-${r.id}">
      <td><span style="font-family:'JetBrains Mono',monospace;color:var(--sub)">#${r.id}</span></td>
      <td><strong>${r.word}</strong></td>
      <td><div class="pattern-tags">${r.patterns.length ? r.patterns.map(p => `<span class="tag">${p}</span>`).join('') : '<span style="color:var(--sub)">없음</span>'}</div></td>
      <td>${severityBadge(r.severity)}</td>
      <td><span style="font-size:12px;color:var(--sub)">${(r.created_at||'').slice(0,10)||'-'}</span></td>
      <td><div class="btn-group">
        <button class="btn btn-warn btn-sm" onclick="editBadword(${r.id})">수정</button>
        <button class="btn btn-danger btn-sm" onclick="deleteBadword(${r.id})">삭제</button>
      </div></td>
    </tr>
  `).join('');
}

async function addBadword() {
  const word     = document.getElementById('bw-word').value.trim();
  const patterns = document.getElementById('bw-patterns').value.split(',').map(s => s.trim()).filter(Boolean);
  const severity = parseInt(document.getElementById('bw-severity').value);
  if (!word) { showToast('단어를 입력해주세요', 'error'); return; }
  const res  = await fetch(`${API}/badwords`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({word, patterns, severity}) });
  const data = await res.json();
  if (!res.ok) { showToast(data.detail, 'error'); return; }
  showToast(data.message);
  document.getElementById('bw-word').value = '';
  document.getElementById('bw-patterns').value = '';
  toggleForm('bw-form');
  loadBadwords();
}

function editBadword(id) {
  // 캐시에서 데이터 꺼내기 (한글 onclick 문제 방지)
  const r = _cache.bw[id];
  if (!r) return;
  const row = document.getElementById(`bw-row-${id}`);
  row.classList.add('edit-row');
  row.innerHTML = `
    <td><span style="font-family:'JetBrains Mono',monospace;color:var(--sub)">#${id}</span></td>
    <td><strong>${r.word}</strong></td>
    <td><input class="edit-input" id="ep-${id}" value="${r.patterns.join(', ')}" placeholder="패턴 쉼표 구분"></td>
    <td>
      <select class="edit-select" id="es-${id}">
        <option value="1" ${r.severity===1?'selected':''}>심각도 1</option>
        <option value="2" ${r.severity===2?'selected':''}>심각도 2</option>
        <option value="3" ${r.severity===3?'selected':''}>심각도 3</option>
      </select>
    </td>
    <td></td>
    <td><div class="btn-group">
      <button class="btn btn-primary btn-sm" onclick="saveBadword(${id})">저장</button>
      <button class="btn btn-ghost btn-sm" onclick="loadBadwords()">취소</button>
    </div></td>
  `;
}

async function saveBadword(id) {
  const patterns = document.getElementById(`ep-${id}`).value.split(',').map(s => s.trim()).filter(Boolean);
  const severity = parseInt(document.getElementById(`es-${id}`).value);
  const res  = await fetch(`${API}/badwords/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({patterns, severity}) });
  const data = await res.json();
  if (!res.ok) { showToast(data.detail, 'error'); return; }
  showToast(data.message);
  loadBadwords();
}

async function deleteBadword(id) {
  const r = _cache.bw[id];
  if (!confirm(`'${r ? r.word : id}' 을 삭제할까요?`)) return;
  const res  = await fetch(`${API}/badwords/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (!res.ok) { showToast(data.detail, 'error'); return; }
  showToast(data.message);
  loadBadwords();
}

// ── 화이트리스트 ──────────────────────────────────────────────────────────────
async function loadWhitelist() {
  const res = await fetch(`${API}/whitelist`).catch(() => null);
  if (!res) { showToast('서버 연결 실패', 'error'); return; }
  const data = await res.json();
  document.getElementById('wl-count').textContent = data.length;
  document.getElementById('wl-empty').style.display = data.length ? 'none' : 'block';
  data.forEach(r => { _cache.wl[r.id] = r; });
  document.getElementById('wl-tbody').innerHTML = data.map(r => `
    <tr>
      <td><span style="font-family:'JetBrains Mono',monospace;color:var(--sub)">#${r.id}</span></td>
      <td><strong>${r.word}</strong></td>
      <td style="color:var(--sub)">${r.reason}</td>
      <td><span style="font-size:12px;color:var(--sub)">${(r.created_at||'').slice(0,10)||'-'}</span></td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteWhitelist(${r.id})">삭제</button></td>
    </tr>
  `).join('');
}

async function addWhitelist() {
  const word   = document.getElementById('wl-word').value.trim();
  const reason = document.getElementById('wl-reason').value.trim();
  if (!word || !reason) { showToast('단어와 이유를 모두 입력해주세요', 'error'); return; }
  const res  = await fetch(`${API}/whitelist`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({word, reason}) });
  const data = await res.json();
  if (!res.ok) { showToast(data.detail, 'error'); return; }
  showToast(data.message);
  document.getElementById('wl-word').value = '';
  document.getElementById('wl-reason').value = '';
  toggleForm('wl-form');
  loadWhitelist();
}

async function deleteWhitelist(id) {
  const r = _cache.wl[id];
  if (!confirm(`'${r ? r.word : id}' 을 삭제할까요?`)) return;
  const res  = await fetch(`${API}/whitelist/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (!res.ok) { showToast(data.detail, 'error'); return; }
  showToast(data.message);
  loadWhitelist();
}

// ── 유저 제재 ─────────────────────────────────────────────────────────────────
async function loadPenalties() {
  const res = await fetch(`${API}/penalties`).catch(() => null);
  if (!res) { showToast('서버 연결 실패', 'error'); return; }
  const data = await res.json();
  document.getElementById('pe-count').textContent = data.length;
  document.getElementById('pe-empty').style.display = data.length ? 'none' : 'block';
  data.forEach(r => { _cache.pe[r.user_id] = r; });
  document.getElementById('pe-tbody').innerHTML = data.map(r => `
    <tr>
      <td><span style="font-family:'JetBrains Mono',monospace">${r.user_id}</span></td>
      <td><span class="badge ${r.warning_count >= 3 ? 'badge-red' : r.warning_count >= 1 ? 'badge-orange' : 'badge-green'}">${r.warning_count}회</span></td>
      <td>${statusBadge(r.status)}</td>
      <td style="color:var(--sub);font-size:12px">${r.reason||'-'}</td>
      <td><span style="font-size:12px;color:var(--sub)">${(r.updated_at||'').slice(0,16)||'-'}</span></td>
      <td><div class="btn-group">
        <button class="btn btn-danger btn-sm" onclick="changePenalty('${r.user_id}', 0)">차단</button>
        <button class="btn btn-warn btn-sm"   onclick="changePenalty('${r.user_id}', 1)">경고</button>
        <button class="btn btn-primary btn-sm" onclick="resetPenalty('${r.user_id}')">초기화</button>
      </div></td>
    </tr>
  `).join('');
}

async function changePenalty(userId, type) {
  // type: 0=차단, 1=경고 (한글을 onclick에 직접 넣지 않음)
  const status = type === 0 ? '차단' : '경고';
  const res  = await fetch(`${API}/penalties/${userId}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status}) });
  const data = await res.json();
  if (!res.ok) { showToast(data.detail, 'error'); return; }
  showToast(data.message);
  loadPenalties();
}

async function resetPenalty(userId) {
  if (!confirm(`${userId} 의 제재를 초기화할까요?`)) return;
  const res  = await fetch(`${API}/penalties/${userId}`, { method: 'DELETE' });
  const data = await res.json();
  if (!res.ok) { showToast(data.detail, 'error'); return; }
  showToast(data.message);
  loadPenalties();
}

// ── 회원 관리 ─────────────────────────────────────────────────────────────────
async function loadUsers() {
  const res = await fetch(`${API}/users`).catch(() => null);
  if (!res) { showToast('서버 연결 실패', 'error'); return; }
  const data = await res.json();
  document.getElementById('us-count').textContent = data.length;
  document.getElementById('us-empty').style.display = data.length ? 'none' : 'block';
  document.getElementById('us-tbody').innerHTML = data.map(r => `
    <tr>
      <td><span style="font-family:'JetBrains Mono',monospace">${r.user_id}</span></td>
      <td><span style="font-size:12px;color:var(--sub)">${(r.created_at||'').slice(0,16)||'-'}</span></td>
      <td><span class="badge ${r.warning_count >= 3 ? 'badge-red' : r.warning_count >= 1 ? 'badge-orange' : 'badge-green'}">${r.warning_count}회</span></td>
      <td>${statusBadge(r.status)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteUser('${r.user_id}')">삭제</button></td>
    </tr>
  `).join('');
}

async function deleteUser(userId) {
  if (!confirm(`'${userId}' 회원을 삭제할까요?`)) return;
  const res  = await fetch(`${API}/users/${userId}`, { method: 'DELETE' });
  const data = await res.json();
  if (!res.ok) { showToast(data.detail, 'error'); return; }
  showToast(data.message);
  loadUsers();
}
async function loadLogs() {
  const res = await fetch(`${API}/logs`).catch(() => null);
  if (!res) { showToast('서버 연결 실패', 'error'); return; }
  const data = await res.json();
  document.getElementById('log-count').textContent = data.length;
  document.getElementById('log-empty').style.display = data.length ? 'none' : 'block';
  document.getElementById('log-tbody').innerHTML = data.map(r => `
    <tr>
      <td><span style="font-family:'JetBrains Mono',monospace;color:var(--sub)">#${r.id}</span></td>
      <td><span style="font-family:'JetBrains Mono',monospace">${r.user_id}</span></td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.original_text}</td>
      <td>${r.result === '악플' ? '<span class="badge badge-red">악플</span>' : '<span class="badge badge-green">정상</span>'}</td>
      <td><span style="color:var(--sub);font-size:12px">${r.detect_method}</span></td>
      <td><span style="font-size:12px;color:var(--sub)">${(r.created_at||'').slice(0,16)}</span></td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteLog(${r.id})">삭제</button></td>
    </tr>
  `).join('');
}

async function deleteLog(id) {
  if (!confirm(`댓글 #${id} 를 삭제할까요?`)) return;
  const res  = await fetch(`${API}/logs/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (!res.ok) { showToast(data.detail, 'error'); return; }
  showToast(data.message);
  loadLogs();
}
